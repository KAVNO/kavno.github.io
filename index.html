<body>

<div id="loginScreen">
<button id="googleLogin">Login with Google</button>

<div id="app">

<div id="layout">

<div id="sidebar">

<h3>Direct Messages</h3>

<div id="userList"></div>

</div>

<div id="chat">

<div id="chatHeader">
Select a user to start chatting
</div>

<div id="messages"></div>

<div id="messageBar">
<input id="messageInput" placeholder="Type message...">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
doc,
getDoc,
getDocs,
addDoc,
setDoc,
query,
where,
onSnapshot,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBnT085eVcbqRiWG_ohyDFc6mShIqRcFOM",
authDomain: "kavno-8e9ea.firebaseapp.com",
projectId: "kavno-8e9ea",
storageBucket: "kavno-8e9ea.firebasestorage.app",
messagingSenderId: "978146900809",
appId: "1:978146900809:web:15265ae75beca386353898"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth();
const db = getFirestore();

const provider = new GoogleAuthProvider();

let currentDM=null;

/* LOGIN */

document.getElementById("googleLogin").onclick=()=>{

signInWithPopup(auth,provider);

};

/* AUTH */

onAuthStateChanged(auth,user=>{

if(!user)return;

document.getElementById("loginScreen").style.display="none";
document.getElementById("app").style.display="block";

loadUsers();

});

/* LOAD USERS FOR DM */

async function loadUsers(){

const usersSnap=await getDocs(collection(db,"users"));

const list=document.getElementById("userList");

list.innerHTML="";

usersSnap.forEach(docSnap=>{

const data=docSnap.data();

if(docSnap.id===auth.currentUser.uid)return;

const div=document.createElement("div");

div.className="user";

div.innerText=data.displayName;

div.onclick=()=>openDM(docSnap.id,data.displayName);

list.appendChild(div);

});

}

/* OPEN DM */

async function openDM(otherUID,name){

document.getElementById("chatHeader").innerText=name;

const q=query(collection(db,"dms"),where("members","array-contains",auth.currentUser.uid));

const snap=await getDocs(q);

let dmId=null;

snap.forEach(d=>{

const m=d.data().members;

if(m.includes(otherUID))dmId=d.id;

});

if(!dmId){

const newDM=await addDoc(collection(db,"dms"),{

members:[auth.currentUser.uid,otherUID]

});

dmId=newDM.id;

}

currentDM=dmId;

listenMessages(dmId);

}

/* SEND MESSAGE */

document.getElementById("messageInput").addEventListener("keypress",async e=>{

if(e.key==="Enter"){

const text=e.target.value;

if(!text||!currentDM)return;

await addDoc(collection(db,"messages"),{

dmId:currentDM,
sender:auth.currentUser.uid,
text:text,
timestamp:Date.now()

});

e.target.value="";

}

});

/* LISTEN FOR MESSAGES */

function listenMessages(dmId){

const q=query(
collection(db,"messages"),
where("dmId","==",dmId),
orderBy("timestamp")
);

onSnapshot(q,snap=>{

const messages=document.getElementById("messages");

messages.innerHTML="";

snap.forEach(docSnap=>{

const m=docSnap.data();

const div=document.createElement("div");

div.className="message";

div.innerHTML=
"<span class='messageUser'>"+m.sender+":</span> "+m.text;

messages.appendChild(div);

});

messages.scrollTop=messages.scrollHeight;

});

}

</script>

</body>
