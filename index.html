<!DOCTYPE html>
<html>
<head>
<title>KAVNO</title>

<style>

body{

</head>

<body>

<div id="loginScreen">
<button id="googleLogin">Login with Google</button>
</div>

<div id="app">

<div id="layout">

<div id="servers">

<div id="profileButton">
<img id="profilePic">
</div>

<div id="accountMenu">
<button id="logoutBtn">Log Out</button>
<button id="deleteAccountBtn" class="danger">Delete Account</button>
</div>

</div>

<div id="channels">
<h3>TEXT CHANNELS</h3>
<div class="channel"># general</div>
<div class="channel"># media</div>
<div class="channel"># gaming</div>
</div>

<div id="chat">

<div id="chatHeader">
# general
</div>

<div id="messages"></div>

<div id="messageBar">
<input id="messageInput" placeholder="Message #general">
</div>

</div>

<div id="members">
<h3>Members</h3>
<div id="memberList"></div>
</div>

</div>

</div>

<div id="onboarding">

<div id="onboardBox">

<h2>Welcome to KAVNO</h2>

<input id="username" placeholder="Username">
<input id="displayName" placeholder="Display name">
<input type="file" id="avatarUpload">

<button id="finishSetup">Finish Setup</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged,
signOut,
deleteUser
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBnT085eVcbqRiWG_ohyDFc6mShIqRcFOM",
authDomain: "kavno-8e9ea.firebaseapp.com",
projectId: "kavno-8e9ea",
storageBucket: "kavno-8e9ea.firebasestorage.app",
messagingSenderId: "978146900809",
appId: "1:978146900809:web:15265ae75beca386353898"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

const provider = new GoogleAuthProvider();

/* LOGIN */

document.getElementById("googleLogin").onclick = () => {

signInWithPopup(auth, provider);

};

/* AUTH STATE */

onAuthStateChanged(auth, async user => {

if(!user) return;

document.getElementById("loginScreen").style.display="none";
document.getElementById("app").style.display="block";

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

if(!snap.exists()){

document.getElementById("onboarding").style.display="flex";

}else{

loadUser(snap.data());

}

});

/* CLOUDINARY UPLOAD */

async function uploadAvatar(file){

const url = "https://api.cloudinary.com/v1_1/dhsj2x1co/image/upload";

const form = new FormData();

form.append("file",file);
form.append("upload_preset","kavnoUploads");

const res = await fetch(url,{
method:"POST",
body:form
});

const data = await res.json();

return data.secure_url;

}

/* ONBOARDING */

document.getElementById("finishSetup").onclick = async () => {

const user = auth.currentUser;

const username = document.getElementById("username").value;
const displayName = document.getElementById("displayName").value;

const file = document.getElementById("avatarUpload").files[0];

let avatar="";

if(file){

avatar = await uploadAvatar(file);

}

await setDoc(doc(db,"users",user.uid),{

username,
displayName,
avatar,
createdAt:Date.now()

});

document.getElementById("onboarding").style.display="none";

loadUser({
username,
displayName,
avatar
});

};

/* LOAD USER */

function loadUser(data){

document.getElementById("profilePic").src = data.avatar;

document.getElementById("memberList").innerHTML =
"<div>"+data.displayName+"</div>";

}

/* PROFILE MENU */

document.getElementById("profileButton").onclick = () => {

const menu = document.getElementById("accountMenu");

menu.style.display =
menu.style.display === "flex" ? "none" : "flex";

};

/* LOG OUT */

document.getElementById("logoutBtn").onclick = () => {

signOut(auth);

location.reload();

};

/* DELETE ACCOUNT */

document.getElementById("deleteAccountBtn").onclick = async () => {

const user = auth.currentUser;

await deleteDoc(doc(db,"users",user.uid));

await deleteUser(user);

alert("Account deleted");

location.reload();

};

</script>

</body>
</html>
