<!DOCTYPE html>
<html>
<head>
<title>KAVNO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#2b2b2b;
color:white;
}

button{
background:#444;
border:none;
padding:10px 18px;
border-radius:10px;
color:white;
cursor:pointer;
}

button:hover{
background:#555;
}

input{
padding:10px;
border-radius:8px;
border:none;
background:#3a3a3a;
color:white;
width:100%;
box-sizing:border-box;
margin-bottom:10px;
}

#loginScreen{
display:flex;
height:100vh;
align-items:center;
justify-content:center;
}

#app{
display:none;
height:100vh;
}

#layout{
display:flex;
height:100%;
}

#servers{
width:70px;
background:#202020;
}

#channels{
width:220px;
background:#333;
padding:15px;
}

#chat{
flex:1;
background:#2f2f2f;
padding:20px;
}

#onboarding{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

#onboardBox{
background:#2f2f2f;
padding:25px;
width:300px;
border-radius:14px;
}

</style>
</head>

<body>

<div id="loginScreen">
<button id="googleLogin">Login with Google</button>
</div>

<div id="app">

<div id="layout">

<div id="servers"></div>

<div id="channels">
<h3 id="usernameDisplay"></h3>
</div>

<div id="chat">
<h2>Welcome to KAVNO</h2>
</div>

</div>

</div>

<div id="onboarding">

<div id="onboardBox">

<h2>Welcome to KAVNO</h2>

<input id="username" placeholder="Username">
<input id="displayName" placeholder="Display name">

<input type="file" id="avatarUpload">

<button id="finishSetup">Finish Setup</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {

  apiKey: "AIzaSyBnT085eVcbqRiWG_ohyDFc6mShIqRcFOM",
  authDomain: "kavno-8e9ea.firebaseapp.com",
  projectId: "kavno-8e9ea",
  storageBucket: "kavno-8e9ea.firebasestorage.app",
  messagingSenderId: "978146900809",
  appId: "1:978146900809:web:15265ae75beca386353898"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

const provider = new GoogleAuthProvider();

document.getElementById("googleLogin").onclick = () => {

signInWithPopup(auth, provider);

};

onAuthStateChanged(auth, async user => {

if(!user) return;

document.getElementById("loginScreen").style.display="none";
document.getElementById("app").style.display="block";

const userRef = doc(db,"users",user.uid);
const userSnap = await getDoc(userRef);

if(!userSnap.exists()){

document.getElementById("onboarding").style.display="flex";

}else{

loadUser(userSnap.data());

}

});


async function uploadAvatar(file){

const url = "https://api.cloudinary.com/v1_1/dhsj2x1co/image/upload";

const form = new FormData();

form.append("file",file);
form.append("upload_preset","kavnoUploads");

const res = await fetch(url,{
method:"POST",
body:form
});

const data = await res.json();

return data.secure_url;

}



document.getElementById("finishSetup").onclick = async () => {

const user = auth.currentUser;

const username = document.getElementById("username").value;
const displayName = document.getElementById("displayName").value;

const file = document.getElementById("avatarUpload").files[0];

let avatar="";

if(file){

avatar = await uploadAvatar(file);

}

await setDoc(doc(db,"users",user.uid),{

username:username,
displayName:displayName,
avatar:avatar,
createdAt:Date.now()

});

document.getElementById("onboarding").style.display="none";

loadUser({
username,
displayName,
avatar
});

};



function loadUser(data){

document.getElementById("usernameDisplay").innerText =
data.displayName + " @" + data.username;

}

</script>

</body>
</html>
